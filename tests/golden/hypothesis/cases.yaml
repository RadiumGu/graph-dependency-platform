# HypothesisAgent Golden Cases
# 由 experiments/strands-poc/sample_for_golden.py 采样生成（direct 引擎 × 2 runs/场景），
# 人工 review 后固化。行为约束式断言：fault_type_must_include_any / failure_domain_must_include_any
# 取至少出现一次的并集；must_not_include 从 scenarios.yaml 合并。
# 断言门槛：20 cases 合计 pass ≥ 18/20。
#
# Sample 覆盖现实：Neptune Microservices 14 个（pethistory, petsite, payforadoption,
# petlistadoptions, petstatusupdater, trafficgenerator, gateway-service, auth-service,
# artillery, order-service, points-service, petsearch, artillery-write, product-service），
# 其中部分服务 callers/resources 为空，LLM 合理返回 0 个假设（已标注 min_hypotheses: 0）。

cases:
- id: S001
  desc: petsite（Tier0, K8s, 多副本）全方位混沌假设
  service_filter: petsite
  max_hypotheses: 10
  expected:
    min_hypotheses: 3
    max_hypotheses: 10
    failure_domain_must_include_any:
    - compute
    - network
    tier_must_equal: Tier0
    fault_type_must_include_any:
    - dns_chaos
    - http_chaos
    - network_delay
    - network_loss
    - network_partition
    - pod_cpu_stress
    - pod_failure
    - pod_memory_stress
- id: S002
  desc: payforadoption（Tier1）混沌假设
  service_filter: payforadoption
  max_hypotheses: 8
  expected:
    min_hypotheses: 2
    max_hypotheses: 8
    tier_must_equal: Tier1
    fault_type_must_include_any:
    - dns_chaos
    - http_chaos
    - network_delay
    - network_loss
    - network_partition
    - pod_cpu_stress
    - pod_failure
    - pod_memory_stress
    - pod_kill
    failure_domain_must_include_any:
    - network
    - resources
    - dependencies
    - compute
- id: S003
  desc: petsearch（Tier0，数据依赖型）
  service_filter: petsearch
  max_hypotheses: 8
  expected:
    min_hypotheses: 0
    max_hypotheses: 8
    failure_domain_must_include_any:
    - dependencies
    - data
    notes: sparse topology / broad scan — may legitimately produce 0
