# Golden cases for Layer2 Probers — behavior constraints (not exact match)
# Generated from direct engine sampling + human review

cases:
  - id: p001
    scenario: "petsite EKS Pod CrashLoopBackOff + SQS 积压"
    signal:
      alarm_name: "petsite-pod-crash"
      alarm_type: "EKS"
      neptune_infra_fault: false
    affected_service: "petsite"
    # With neptune_infra_fault=false, deployment probe should run
    min_probes_returning: 1
    max_probes_returning: 6
    min_score_delta: 0
    max_score_delta: 40
    summary_not_empty: true

