# Golden Set Scenarios for LearningAgent
# 4 类分桶：核心服务(3) / 特殊后端(3) / 错误输入(2) / 边界(2)

# ── 核心服务 ──
- id: l001
  description: "petsite 核心服务 coverage 分析"
  fixture: "coverage_snapshot_l001.json"
  bucket: "core"
  min_recommendations: 1
  max_recommendations: 10
  dimension_must_include_any: ["coverage", "resilience"]
  recommendation_must_not_include: ["delete_service", "shutdown"]
  coverage_has_gaps: true  # petsite 不可能覆盖全部 5 域
  should_error: false

