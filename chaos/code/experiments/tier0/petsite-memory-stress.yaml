# ChaosMesh：Memory Stress（petsite）
# 对 petsite Pod 注入内存压力，验证 OOMKill 阈值和 Pod 恢复

name: petsite-memory-stress
description: "Inject memory stress on petsite pods, verify OOM handling and recovery"
backend: chaosmesh

target:
  service: petsite
  namespace: petadoptions
  tier: Tier0

fault:
  type: pod_memory_stress
  mode: all
  value: ""
  duration: "5m"
  extra_params:
    size: "256MB"
    workers: 1

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 85%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: petsite

graph_feedback:
  enabled: true
  edges:
    - Calls

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
