# ChaosMesh：Network Partition（payforadoption ↔ Aurora）
# 完全隔离 payforadoption 与外部网络，模拟网络分区
# 验证：数据库连接池断开后的重连行为、事务回滚

name: payforadoption-network-partition
description: "Network partition payforadoption from all external targets, verify DB reconnect and tx rollback"
backend: chaosmesh

target:
  service: payforadoption
  namespace: petadoptions
  tier: Tier0

fault:
  type: network_partition
  mode: all
  value: ""
  duration: "2m"
  extra_params:
    direction: "both"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 85%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 30%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: payforadoption

graph_feedback:
  enabled: true
  edges:
    - Calls

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
