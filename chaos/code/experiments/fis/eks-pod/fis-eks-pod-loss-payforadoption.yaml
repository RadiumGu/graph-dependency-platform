# FIS Pod Action：Pod Network Packet Loss（payforadoption）
# 对 payforadoption Pod 注入 30% 丢包
# 与 ChaosMesh 对照：FIS 的 flowsPercent 控制更精细

name: fis-eks-pod-loss-payforadoption
description: "Inject 30% packet loss on payforadoption pods via FIS native pod action"
backend: fis

target:
  service: payforadoption
  namespace: eks-pod
  tier: Tier0

fault:
  type: fis_eks_pod_network_packet_loss
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=payforadoption"
    loss_percent: 30
    flows_percent: 100
    interface: "DEFAULT"
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 85%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: payforadoption

graph_feedback:
  enabled: false

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
