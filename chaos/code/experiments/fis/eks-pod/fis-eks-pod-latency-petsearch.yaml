# FIS Pod Action：Pod Network Latency（petsearch）
# FIS 原生网络延迟注入 — 网络流层，AZ 感知
# 对 petsearch 注入 300ms 延迟，与 ChaosMesh 的 tc netem 对照

name: fis-eks-pod-latency-petsearch
description: "Inject 300ms network latency on petsearch pods via FIS, compare with ChaosMesh NetworkChaos"
backend: fis

target:
  service: petsearch
  namespace: eks-pod
  tier: Tier0

fault:
  type: fis_eks_pod_network_latency
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=petsearch"
    delay_ms: 300
    flows_percent: 100
    interface: "DEFAULT"
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"
    - metric: latency_p99
      threshold: "< 5000ms"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: petsearch

graph_feedback:
  enabled: false

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
