# FIS Pod Action：Pod Delete（petsite）
# 与 ChaosMesh pod-kill 对照：FIS 原生 Pod Delete，通过 K8s API 删除
# 验证 FIS agent 路径 vs ChaosMesh 路径的行为差异

name: fis-eks-pod-delete-petsite
description: "Delete petsite pods via FIS native pod action, compare with ChaosMesh pod-kill behavior"
backend: fis

target:
  service: petsite
  namespace: eks-pod
  tier: Tier0

fault:
  type: fis_eks_pod_delete
  mode: all
  value: "100"
  duration: "3m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=petsite"
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "30s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: petsite

graph_feedback:
  enabled: false

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
