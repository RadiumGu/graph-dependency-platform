# FIS Pod Action：CPU Stress（petsite）
# 对 petsite Pod 注入 80% CPU 压力
# 与 ChaosMesh StressChaos 对照：FIS 原生路径

name: fis-eks-pod-cpu-stress-petsite
description: "Inject 80% CPU stress on petsite pods via FIS, verify HPA scaling and degradation"
backend: fis

target:
  service: petsite
  namespace: eks-pod
  tier: Tier0

fault:
  type: fis_eks_pod_cpu_stress
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=petsite"
    workers: 2
    cpu_percent: 80
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 85%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: petsite

graph_feedback:
  enabled: false

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
