# FIS Pod Action：IO Stress（payforadoption）
# 对 payforadoption Pod 注入磁盘 IO 压力
# 验证数据库写入路径在高 IO 负载下的行为

name: fis-eks-pod-io-stress-payforadoption
description: "Inject IO stress on payforadoption pods via FIS, verify write path degradation"
backend: fis

target:
  service: payforadoption
  namespace: eks-pod
  tier: Tier0

fault:
  type: fis_eks_pod_io_stress
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=payforadoption"
    workers: 1
    io_percent: 80
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 85%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: payforadoption

graph_feedback:
  enabled: false

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
