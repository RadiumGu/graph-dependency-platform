# FIS EC2：Reboot EKS Node（workers-1a）
# 与 stop/terminate 不同：reboot 不触发 ASG 替换，验证节点在线重启后的 Pod 恢复
# 验证：kubelet 重启后 Pod 状态恢复、DaemonSet 重建

name: fis-ec2-reboot-node-1a
description: "Reboot 1 EC2 instance in workers-1a, verify node recovery without ASG replacement"
backend: fis

target:
  service: eks-nodegroup
  namespace: ec2
  tier: Tier0

fault:
  type: fis_ec2_reboot
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    resource_type: "ec2:instance"
    tags:
      "eks:nodegroup-name": "petsiteNodegroupworkers1a60-ZJElxYDbKT8H"
      "eks:cluster-name": "PetSite"
    selection_mode: "COUNT(1)"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "60s"
  expected_root_cause: ec2-instance-reboot

graph_feedback:
  enabled: false

options:
  max_duration: "15m"
  save_to_bedrock_kb: false
