# FIS 场景：AWS API Internal Error（500）注入
# 对 EKS node role 的 AWS API 调用注入 500 错误
# 验证：SDK 重试机制、exponential backoff、circuit breaker 行为

name: fis-api-internal-error-eks
description: "Inject AWS API 500 errors for EKS node role, verify SDK retry and error handling"
backend: fis

target:
  service: eks-control-plane
  namespace: api-injection
  tier: Tier1

fault:
  type: fis_api_internal_error
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    resource_type: "iam:role"
    role_arn: "arn:aws:iam::926093770964:role/ServicesEks2-petsiteNodegroupworkers1aNodeGroupRole-YXpfPBKFoRCE"
    percentage: 30                         # 30% API 调用返回 500
    service: "ec2"
    operations: "DescribeInstances"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: false

graph_feedback:
  enabled: false

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
