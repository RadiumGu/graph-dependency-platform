# FIS 场景：Cross-AZ Traffic Slowdown（1c → 1a 丢包）
# 对称实验：检测跨 AZ 故障是否有方向不对称

name: fis-cross-az-traffic-slowdown-1c
description: "Inject 15% packet loss on outbound cross-AZ traffic from 1c pods to 1a, simulating gray failure"
backend: fis

target:
  service: petsite
  namespace: az-scenario
  tier: Tier0

fault:
  type: fis_eks_pod_network_packet_loss
  mode: all
  value: "100"
  duration: "10m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=petsite"
    availability_zone: "ap-northeast-1c"
    sources: "ap-northeast-1a"
    loss_percent: 15
    flows_percent: 100
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"
    - metric: latency_p99
      threshold: "< 5000ms"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "60s"
  expected_root_cause: network-cross-az

graph_feedback:
  enabled: false

options:
  max_duration: "15m"
  save_to_bedrock_kb: false
