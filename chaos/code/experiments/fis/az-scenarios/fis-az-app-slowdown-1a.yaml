# FIS 场景：AZ Application Slowdown（1a 内部延迟）
# 参考: https://docs.aws.amazon.com/fis/latest/userguide/az-application-slowdown-scenario.html
# 在 1a 内部 Pod 间注入 200ms 延迟，模拟单 AZ 应用减速
# 与 ChaosMesh 区别：FIS 在网络流层，影响所有同 AZ Pod 间通信

name: fis-az-app-slowdown-1a
description: "Add 200ms latency between pods within AZ 1a, simulating intra-AZ application slowdown"
backend: fis

target:
  service: petsite
  namespace: az-scenario
  tier: Tier0

fault:
  type: fis_eks_pod_network_latency
  mode: all
  value: "100"
  duration: "10m"
  extra_params:
    cluster_name: "PetSite"
    namespace: "petadoptions"
    selector_type: "labelSelector"
    selector_value: "app=petsite"
    availability_zone: "ap-northeast-1a"
    sources: "ap-northeast-1a"
    delay_ms: 200
    flows_percent: 100
    kubernetes_service_account: "fis-service-account"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"
    - metric: latency_p99
      threshold: "< 5000ms"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "60s"
  expected_root_cause: network-intra-az

graph_feedback:
  enabled: false

options:
  max_duration: "15m"
  save_to_bedrock_kb: false
