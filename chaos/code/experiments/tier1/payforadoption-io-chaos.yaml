# ChaosMesh：IO Chaos（payforadoption）
# 注入文件系统 IO 延迟，模拟磁盘慢 IO
# 验证：写入路径在磁盘延迟下的超时行为

name: payforadoption-io-chaos
description: "Inject filesystem IO latency on payforadoption, verify write path timeout handling"
backend: chaosmesh

target:
  service: payforadoption
  namespace: petadoptions
  tier: Tier1

fault:
  type: io_chaos
  mode: all
  value: ""
  duration: "3m"
  extra_params:
    io_action: "latency"
    io_delay: "200ms"
    volume_path: "/"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 85%"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: payforadoption

graph_feedback:
  enabled: true
  edges:
    - Calls

options:
  max_duration: "10m"
  save_to_bedrock_kb: false
