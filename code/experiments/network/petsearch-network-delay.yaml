name: petsearch-network-delay-tier0
description: "给 petsearch 加 200ms 网络延迟，验证延迟传播和 RCA 准确性"

target:
  service: petsearch
  namespace: default
  tier: Tier0

fault:
  type: network_delay
  mode: all
  value: "100"
  duration: "3m"
  latency: "200ms"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 99%"
      window: "1m"
    - metric: latency_p99
      threshold: "< 300ms"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 99%"
      window: "5m"
    - metric: latency_p99
      threshold: "< 300ms"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 80%"
    window: "30s"
    action: abort
  - metric: latency_p99
    threshold: "> 8000ms"
    window: "30s"
    action: abort

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: petsearch

graph_feedback:
  enabled: true
  edges:
    - Calls

options:
  max_duration: "10m"
