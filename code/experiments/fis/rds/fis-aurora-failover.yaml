# FIS 实验：Aurora MySQL 主从切换（Failover）
# 验证 petlistadoptions 和 payforadoption 在 RDS 主从切换时的重连能力
# backend: fis — 通过 AWS FIS aws:rds:failover-db-cluster 注入

name: fis-aurora-failover
description: "Force Aurora MySQL cluster failover, verify petlistadoptions/payforadoption reconnection within SLO"
backend: fis

target:
  service: petlistadoptions
  namespace: rds
  tier: Tier1

fault:
  type: fis_rds_failover
  mode: all
  value: "100"
  duration: "5m"
  extra_params:
    service_name: "petlistadoptions"  # TargetResolver: Microservice → DependsOn → RDSCluster
    resource_type: "rds:cluster"
    # cluster_arn: 由 TargetResolver 在运行时解析并写入

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 90%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 90%"
      window: "5m"
    - metric: latency_p99
      threshold: "< 8000ms"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 30%"
    window: "60s"
    action: abort
    cloudwatch_alarm_arn: "arn:aws:cloudwatch:ap-northeast-1:926093770964:alarm:chaos-petlistadoptions-sr-critical"
  - metric: success_rate
    threshold: "< 30%"
    window: "60s"
    action: abort
    cloudwatch_alarm_arn: "arn:aws:cloudwatch:ap-northeast-1:926093770964:alarm:chaos-rds-sr-critical"

rca:
  enabled: true
  trigger_after: "30s"
  expected_root_cause: petlistadoptions

graph_feedback:
  enabled: true
  edges:
    - DependsOn

options:
  max_duration: "15m"
  save_to_bedrock_kb: false
