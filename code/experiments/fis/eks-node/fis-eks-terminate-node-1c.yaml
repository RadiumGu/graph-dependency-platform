# FIS 实验：终止 EKS 工作节点（AZ ap-northeast-1c 侧）
# 实际 nodegroup 跨 AZ (1a+1c)，这里用 COUNT(1) 终止 1 个节点
# 与 1a 实验配套，验证多次单节点故障时的高可用性

name: fis-eks-terminate-node-1c
description: "Terminate 1 EKS worker node in AZ ap-northeast-1c, verify multi-AZ HA and Pod rescheduling"
backend: fis

target:
  service: eks-nodegroup
  namespace: eks
  tier: Tier0

fault:
  type: fis_eks_terminate_node
  mode: all
  value: "100"
  duration: "10m"
  extra_params:
    service_name: "PetSite"       # TargetResolver: EKS 集群名 → 第一个 nodegroup ARN
    resource_type: "eks:nodegroup"
    # nodegroup_arn: 由 TargetResolver 在运行时解析并写入
    selection_mode: "COUNT(1)"

steady_state:
  before:
    - metric: success_rate
      threshold: ">= 95%"
      window: "1m"
  after:
    - metric: success_rate
      threshold: ">= 95%"
      window: "5m"
    - metric: latency_p99
      threshold: "< 5000ms"
      window: "5m"

stop_conditions:
  - metric: success_rate
    threshold: "< 50%"
    window: "60s"
    action: abort
    cloudwatch_alarm_arn: "arn:aws:cloudwatch:ap-northeast-1:926093770964:alarm:chaos-eks-sr-critical"

rca:
  enabled: true
  trigger_after: "60s"
  expected_root_cause: eks-node

graph_feedback:
  enabled: false

options:
  max_duration: "20m"
  save_to_bedrock_kb: false
